            {"M: マラソン特異的な持久力。レース4〜8週前から導入。"}<br/>
            {"T: 乳酸性閾値の向上。週1〜2回、合計30分以内。"}<br/>
            {"I: VO2max向上。週1回、合計8km以内。3〜5分の反復。"}<br/>
            {"R: ランニングエコノミー改善。200〜400mの短い反復。"}
          </div>
        </div>
      </div>}

      {/* SHOES */}
      {view==="shoes"&&<div>
        {sI.length>0&&<div style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:14,padding:"16px 4px 8px",marginBottom:14,boxShadow:C.cs}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:4,paddingLeft:10}}>{"👟 シューズ影響度"}</div>
          <div style={{fontSize:10,color:C.tm,marginBottom:10,paddingLeft:10}}>{"平均VDOT("+gAll+")との差"}</div>
          <ResponsiveContainer width="100%" height={Math.max(120,sI.length*52)}>
            <BarChart data={sI} layout="vertical" margin={{left:10,right:20}}>
              <CartesianGrid strokeDasharray="3 3" stroke="#eee" horizontal={false}/>
              <XAxis type="number" tick={{fontSize:10,fill:C.tm}} axisLine={false} tickLine={false}/>
              <YAxis type="category" dataKey="name" tick={{fontSize:11,fill:C.sv}} axisLine={false} tickLine={false} width={100}/>
              <Tooltip content={function(p2){if(!p2.active||!p2.payload||!p2.payload.length)return null;var d=p2.payload[0].payload;return <div style={{background:"#fff",border:"1px solid #ddd",borderRadius:10,padding:"10px 14px",fontSize:13}}><div style={{fontWeight:700,color:d.color}}>{d.full}</div><div>{"平均:"+d.av+" 影響:"+(d.imp>0?"+":"")+d.imp}</div><div>{d.count+"回"}</div></div>}}/>
              <Bar dataKey="imp" radius={[0,6,6,0]} maxBarSize={28}>{sI.map(function(e,i){return <Cell key={i} fill={e.color} fillOpacity={.85}/>})}</Bar>
              <ReferenceLine x={0} stroke="#ccc"/>
            </BarChart>
          </ResponsiveContainer>
        </div>}
        {rD.length>0&&<div style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:14,padding:"16px 4px 8px",marginBottom:14,boxShadow:C.cs}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8,paddingLeft:10}}>{"🎯 総合比較"}</div>
          <ResponsiveContainer width="100%" height={260}>
            <RadarChart data={rD} cx="50%" cy="50%" outerRadius="70%"><PolarGrid stroke="#ddd"/><PolarAngleAxis dataKey="metric" tick={{fontSize:11,fill:C.sv}}/><PolarRadiusAxis tick={false} axisLine={false}/>
              {sS.filter(function(s){return s.count>0}).slice(0,3).map(function(s){return <Radar key={s.id} name={s.name} dataKey={s.name} stroke={s.color} fill={s.color} fillOpacity={.12} strokeWidth={2}/>})}
              <Legend wrapperStyle={{fontSize:11,color:C.sv}}/></RadarChart>
          </ResponsiveContainer>
        </div>}
        <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>{"👟 登録シューズ"}</div>
        {sS.map(function(s){var si=shoes.findIndex(function(x){return x.id===s.id});return <div key={s.id} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderLeft:"4px solid "+s.color,borderRadius:12,padding:14,marginBottom:8,boxShadow:C.cs}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:24,height:24,borderRadius:6,background:s.color,color:"#fff",fontSize:12,fontWeight:800,fontFamily:"'Space Mono',monospace"}}>{si>=0?si+1:"?"}</span><span style={{fontSize:14,fontWeight:700,color:s.color}}>{s.name}</span></div>{s.brand?<div style={{fontSize:11,color:C.tm,marginLeft:32}}>{s.brand}</div>:null}<div style={{fontSize:11,color:C.td,marginTop:4,marginLeft:32}}>{s.count+"回 ・ "+s.td.toFixed(1)+"km ・ 平均"+s.av+" ・ 最高"+s.bv}</div></div><button onClick={function(){save({...data,shoes:shoes.filter(function(x){return x.id!==s.id}),runs:runs.map(function(r){return r.shoeId===s.id?{...r,shoeId:""}:r})})}} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:18,padding:4}}>{"×"}</button></div>
        </div>})}
        <button onClick={function(){setSsf(!ssf)}} style={{width:"100%",padding:"12px",border:"1.5px dashed #ccc",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:ssf?C.a5+"0c":"#fff",color:C.a5,marginTop:8}}>{ssf?"✕ 閉じる":"＋ シューズ追加"}</button>
        {ssf&&<div style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:14,padding:16,marginTop:10,boxShadow:C.cs}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <div><label style={{fontSize:10,color:C.td,display:"block",marginBottom:3}}>{"名前"}</label><input placeholder="Vaporfly 3" value={sf.name} onChange={function(e){setSf({...sf,name:e.target.value})}} style={inp}/></div>
            <div><label style={{fontSize:10,color:C.td,display:"block",marginBottom:3}}>{"ブランド"}</label><input placeholder="Nike" value={sf.brand} onChange={function(e){setSf({...sf,brand:e.target.value})}} style={inp}/></div>
          </div>
          <button onClick={aSh} style={{width:"100%",padding:"12px",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700,background:"linear-gradient(135deg,"+C.a5+","+C.a2+")",color:"#fff"}}>{"追加"}</button>
        </div>}
      </div>}

      {/* HISTORY */}
      {view==="history"&&<div>
        <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>{"全"+runs.length+"件"}</div>
        {sorted.slice().reverse().map(function(r){
          var ts=r.minutes*60+r.seconds,it=getInt(r,prof),a2=aV(r.distance,r.minutes,r.seconds,it.p,it.s),r2=rV(r.distance,r.minutes,r.seconds),lv2=vL(a2),sh=shoes.find(function(s){return s.id===r.shoeId}),ic=iC(it.p);
          var tag=it.s==="hr"?"♥"+r.avgHR+" "+Math.round(it.p*100)+"%":it.s==="rpe"?"RPE"+r.rpe+" "+Math.round(it.p*100)+"%":"レース扱い";
          return <div key={r.id} style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:12,padding:14,marginBottom:8,boxShadow:C.cs}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}><span style={{fontSize:13,fontWeight:700}}>{r.date}</span><span style={{fontSize:9,color:ic,background:ic+"15",padding:"2px 6px",borderRadius:4,fontWeight:600}}>{tag}</span>{sh?<span style={{fontSize:9,color:sh.color,background:sh.color+"12",padding:"2px 6px",borderRadius:4}}>{sh.name}</span>:null}</div>
              <div style={{fontSize:11,color:C.td,marginTop:3}}>{r.distance+"km ・ "+r.minutes+":"+(r.seconds||0).toString().padStart(2,"0")+" ・ "+fP(ts,r.distance)+"/km"}</div>
              {r.note?<div style={{fontSize:11,color:C.tm,marginTop:3}}>{"💬 "+r.note}</div>:null}</div>
              <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:24,fontWeight:800,color:lv2.c,fontFamily:"'Space Mono',monospace",lineHeight:1}}>{a2}</div><div style={{fontSize:9,color:C.tm}}>{it.s==="none"?"ダニエルズ式":r2!==a2?"補正(実測"+r2+")":"VDOT"}</div></div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:10}}>
              <button onClick={function(){hEdit(r)}} style={{flex:1,padding:"8px",border:"1.5px solid #ddd",borderRadius:7,background:"#fff",color:C.sv,fontSize:12,cursor:"pointer"}}>{"編集"}</button>
              <button onClick={function(){save({...data,runs:runs.filter(function(x){return x.id!==r.id})})}} style={{flex:1,padding:"8px",border:"1.5px solid "+C.red+"33",borderRadius:7,background:C.rl,color:C.red,fontSize:12,cursor:"pointer"}}>{"削除"}</button>
            </div>
          </div>
        })}
        {/* Import Section */}
        <button onClick={function(){setShowImp(!showImp);setImpPrev(null);setImpErr("")}} style={{width:"100%",padding:"12px",border:"2px dashed "+C.a2+"44",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:showImp?C.a2+"10":"#fff",color:C.a2,marginTop:10}}>
          {showImp?"✕ 閉じる":"📥 .txtから一括インポート"}
        </button>
        {showImp&&<div style={{background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:12,padding:16,marginTop:8,boxShadow:C.cs}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>{"📄 フォーマット (.txt)"}</div>
          <div style={{background:"#f7f7f7",borderRadius:8,padding:12,fontSize:11,fontFamily:"'Space Mono',monospace",color:C.td,lineHeight:1.8,marginBottom:10,overflowX:"auto",whiteSpace:"pre"}}>{"# 日付, 距離km, タイム分:秒, 強度, シューズNo, メモ\n2026-01-15, 5.0, 25:30, HR155, 1, テンポ走\n2026-01-20, 10.0, 52:00, RPE7, 2, ロング\n2026-02-01, 5.0, 28:00, , , リカバリー"}</div>
          <div style={{background:"#f0f4ff",borderRadius:8,padding:10,marginBottom:10,border:"1px solid #d0daf0"}}>
            <div style={{fontSize:10,fontWeight:700,color:C.a2,marginBottom:4}}>{"👟 シューズ番号"}</div>
            {shoes.map(function(s,i){return <div key={s.id} style={{fontSize:11,display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,borderRadius:5,background:s.color,color:"#fff",fontSize:10,fontWeight:800,fontFamily:"'Space Mono',monospace"}}>{i+1}</span>
              <span style={{color:C.t}}>{s.name}</span>
            </div>})}
            {shoes.length===0&&<div style={{fontSize:11,color:C.tm}}>{"シューズ未登録（先にシューズ分析タブで追加）"}</div>}
          </div>
          <div style={{fontSize:10,color:C.tm,marginBottom:12,lineHeight:1.6}}>
            {"• 1行1ラン、カンマ区切り"}<br/>
            {"• 強度: HR155(心拍数) / RPE7(主観) / 空欄OK"}<br/>
            {"• シューズ: 上の番号(1,2,3...) / 空欄OK"}<br/>
            {"• #で始まる行はコメント（無視）"}
          </div>
          <label style={{display:"block",width:"100%",padding:"12px",border:"2px dashed #ddd",borderRadius:10,cursor:"pointer",textAlign:"center",fontSize:13,fontWeight:600,color:C.a2,background:"#fafafa",marginBottom:8}}>
            {"📂 .txtファイルを選択"}
            <input type="file" accept=".txt" onChange={handleFileImport} style={{display:"none"}}/>
          </label>
          {impErr&&<div style={{background:"#fff5f5",border:"1px solid #f5cccc",borderRadius:8,padding:10,fontSize:11,color:"#c00",marginBottom:8,whiteSpace:"pre-wrap"}}>{impErr}</div>}
          {impPrev&&impPrev.parsed.length>0&&<div>
            <div style={{fontSize:12,fontWeight:700,color:C.a3,marginBottom:6}}>{impPrev.parsed.length+"件のデータを検出"}</div>
            <div style={{maxHeight:200,overflowY:"auto",marginBottom:10}}>
              {impPrev.parsed.map(function(r,i){
                var gi=getInt(r,prof),v=aV(r.distance,r.minutes,r.seconds,gi.p,gi.s);
                var sh=shoes.find(function(s){return s.id===r.shoeId});
                return <div key={i} style={{fontSize:11,padding:"6px 8px",background:i%2===0?"#f9f9f9":"#fff",borderRadius:6,marginBottom:2,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{r.date+" "+r.distance+"km "+r.minutes+":"+String(r.seconds).padStart(2,"0")}{r.avgHR?" HR"+r.avgHR:r.rpe?" RPE"+r.rpe:""}{sh?" 👟"+sh.name:""}{r.note?" "+r.note:""}</span>
                  <span style={{fontWeight:700,color:C.red,fontFamily:"'Space Mono',monospace",flexShrink:0}}>{v}</span>
                </div>
              })}
            </div>
            <button onClick={doImport} style={{width:"100%",padding:"12px",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:700,background:C.red,color:"#fff"}}>{"✓ "+impPrev.parsed.length+"件をインポート"}</button>
          </div>}
        </div>}
        {/* JSON Sync Section */}
        <div style={{marginTop:14,padding:"14px",background:"#fff",border:"1.5px solid #e0e0e0",borderRadius:12,boxShadow:C.cs}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{"🔄 PC ↔ iPhone データ同期"}</div>
          <div style={{fontSize:10,color:C.tm,marginBottom:12,lineHeight:1.5}}>{"JSONファイルでデータを書き出し・読み込み。AirDropやiCloudで端末間を転送できます。"}</div>

          <button onClick={exportJSON} style={{width:"100%",padding:"12px",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:C.a3,color:"#fff",marginBottom:8}}>
            {"📤 データを書き出し (.json)"}
          </button>
          <div style={{fontSize:10,color:C.tm,marginBottom:12,textAlign:"center"}}>{"ラン"+runs.length+"件 ・ シューズ"+shoes.length+"足 ・ HR設定を含む全データ"}</div>

          <button onClick={function(){setShowJSON(!showJSON);setJsonPrev(null);setJsonErr("")}} style={{width:"100%",padding:"12px",border:"2px dashed "+C.a3+"44",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:showJSON?C.a3+"10":"#fafafa",color:C.a3}}>
            {showJSON?"✕ 閉じる":"📥 データを読み込み (.json)"}
          </button>

          {showJSON&&<div style={{marginTop:10}}>
            <label style={{display:"block",width:"100%",padding:"12px",border:"2px dashed #ddd",borderRadius:10,cursor:"pointer",textAlign:"center",fontSize:13,fontWeight:600,color:C.a3,background:"#f8fff8",marginBottom:8}}>
              {"📂 .jsonファイルを選択"}
              <input type="file" accept=".json" onChange={handleJSONImport} style={{display:"none"}}/>
            </label>
            {jsonErr&&<div style={{background:"#fff5f5",border:"1px solid #f5cccc",borderRadius:8,padding:10,fontSize:11,color:"#c00",marginBottom:8}}>{jsonErr}</div>}
            {jsonPrev&&<div>
              <div style={{background:"#f0f9f0",border:"1px solid #c0e0c0",borderRadius:8,padding:12,marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:C.a3,marginBottom:6}}>{"読み込みデータの内容"}</div>
                <div style={{fontSize:11,color:C.td}}>{"ラン記録: "+jsonPrev.runs.length+"件"}</div>
                <div style={{fontSize:11,color:C.td}}>{"シューズ: "+(jsonPrev.shoes?jsonPrev.shoes.length:0)+"足"}</div>
                {jsonPrev.runs.length>0&&<div style={{fontSize:11,color:C.td}}>{"期間: "+jsonPrev.runs[0].date+" 〜 "+jsonPrev.runs[jsonPrev.runs.length-1].date}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={function(){doJSONImport("merge")}} style={{flex:1,padding:"12px",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:C.a3,color:"#fff"}}>
                  {"🔀 マージ"}
                </button>
                <button onClick={function(){doJSONImport("replace")}} style={{flex:1,padding:"12px",border:"1.5px solid "+C.red,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:C.rl,color:C.red}}>
                  {"🔄 上書き"}
                </button>
              </div>
              <div style={{fontSize:9,color:C.tm,marginTop:6,lineHeight:1.5}}>{"マージ: 既存データを残して新規分だけ追加。上書き: 全データを読み込んだファイルで置き換え。"}</div>
            </div>}
          </div>}
        </div>

        <button onClick={function(){var i={runs:dRn,shoes:dSh,profile:dPf};LS.del(SK);setData(i);LS.set(SK,i)}} style={{width:"100%",padding:"12px",border:"1.5px solid #ddd",borderRadius:10,cursor:"pointer",fontSize:12,background:"#fff",color:C.tm,marginTop:10}}>{"🔄 サンプルにリセット"}</button>
      </div>}
    </div>
  </div>;
}
document.getElementById('boot').style.display='none';
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
